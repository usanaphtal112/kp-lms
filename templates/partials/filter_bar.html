{% if filter_form %}
<form method="get" class="surface-card filter-card mb-4" aria-label="Filter records">
    <div class="row g-3 align-items-end">
        {% for field in filter_form %}
            <div class="col-sm-6 col-xl">
                <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="invalid-feedback d-block">{{ field.errors }}</div>{% endif %}
            </div>
        {% endfor %}
        <div class="col-sm-6 col-xl-auto d-flex gap-2">
            <button class="btn btn-kp-primary flex-grow-1" type="submit"><i class="bi bi-funnel me-1"></i>Filter</button>
            <a class="btn btn-outline-secondary" href="{{ request.path }}" aria-label="Reset filters"><i class="bi bi-arrow-counterclockwise"></i></a>
        </div>
    </div>
</form>
{% endif %}
