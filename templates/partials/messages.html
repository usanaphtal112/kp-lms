{% if messages %}
<div class="kp-alerts" aria-live="polite" aria-atomic="true">
    {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-danger{% elif message.tags == 'success' %}alert-success{% elif message.tags == 'warning' %}alert-warning{% else %}alert-info{% endif %} alert-dismissible fade show d-flex align-items-start gap-2"
             role="alert" {% if message.tags != 'error' %}data-auto-dismiss="6500"{% endif %}>
            <i class="bi {% if message.tags == 'error' %}bi-exclamation-octagon{% elif message.tags == 'success' %}bi-check-circle{% elif message.tags == 'warning' %}bi-exclamation-triangle{% else %}bi-info-circle{% endif %} mt-1" aria-hidden="true"></i>
            <div class="flex-grow-1">{{ message }}</div>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    {% endfor %}
</div>
{% endif %}
